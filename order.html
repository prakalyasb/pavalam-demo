<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Order Online | Pavalam Industries</title>

    <link rel="stylesheet" href="order.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<header>

    <div class="logo">

        <img src="https://cdn-icons-png.flaticon.com/512/2921/2921822.png">

        <h2>Pavalam Industries</h2>

    </div>

    <nav>

        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>

    </nav>

</header>

<section class="banner">

    <h1>Place Your Order</h1>

    <p>

        Order premium quality products directly from Pavalam Industries.

    </p>

</section>

<section class="order-container">

<form id="orderForm">

<h2>Customer Details</h2>

<div class="row">

<div class="inputBox">

<label>Full Name</label>

<input type="text"
       id="name"
       required>

</div>

<div class="inputBox">

<label>Phone Number</label>

<input type="tel"
       id="phone"
       required>

</div>

</div>

<div class="row">

<div class="inputBox">

<label>Email Address</label>

<input type="email"
       id="email"
       required>

</div>

<div class="inputBox">

<label>City</label>

<input type="text"
       id="city"
       required>

</div>

</div>

<div class="inputBox">

<label>Delivery Address</label>

<textarea
id="address"
required></textarea>

</div>

<hr>

<h2>Product Details</h2>

<div class="row">

<div class="inputBox">

<label>Select Product</label>

<select id="product">

<option>Pesticides</option>

<option>Sambrani</option>

<option>Agarbatti</option>

</select>

</div>

<div class="inputBox">

<label>Quantity</label>

<input
type="number"
id="qty"
min="1"
value="1">

</div>

</div>

<div class="row">

<div class="inputBox">

<label>Delivery Date</label>

<input
type="date"
id="date">

</div>

<div class="inputBox">

<label>Payment Method</label>

<select id="payment">

<option>Cash On Delivery</option>

<option>UPI</option>

<option>Credit Card</option>

<option>Debit Card</option>

<option>Net Banking</option>

</select>

</div>

</div>

<div class="inputBox">

<label>Special Instructions</label>

<textarea
id="message"></textarea>

</div>

<hr>

<div class="summary">

<h2>Order Summary</h2>

<p>

Product :
<span id="summaryProduct">

Pesticides

</span>

</p>

<p>

Quantity :
<span id="summaryQty">

1

</span>

</p>

</div>

<button type="submit">

<i class="fa-solid fa-cart-shopping"></i>

Place Order

</button>

</form>

</section>

<footer>

<p>

© 2026 Pavalam Industries

</p>

</footer>

<script src="order.js"></script>

</body>

</html>
