<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | Pavalam Industries</title>

    <link rel="stylesheet" href="login.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<header>

    <a href="index.html" class="homeBtn">

        <i class="fa-solid fa-house"></i>

        Home

    </a>

</header>

<div class="container">

    <div class="left">

        <img src="https://cdn-icons-png.flaticon.com/512/2921/2921822.png"
             alt="Logo">

        <h1>Pavalam Industries</h1>

        <p>

            Welcome back!

            Login to manage orders, view products,
            and track deliveries.

        </p>

    </div>

    <div class="right">

        <form id="loginForm">

            <h2>Login</h2>

            <div class="inputBox">

                <i class="fa-solid fa-user"></i>

               <input
    type="email"
    id="username"
    placeholder="Email Address"
    required>

            </div>

            <div class="inputBox">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required>

                <i
                    class="fa-solid fa-eye"
                    id="togglePassword">
                </i>

            </div>

            <div class="options">

                <label>

                    <input type="checkbox">

                    Remember Me

                </label>

                <a href="#">

                    Forgot Password?

                </a>

            </div>

            <button type="submit">

                Login

            </button>

            <div class="divider">

                OR

            </div>

            <button
                type="button"
                class="google">

                <i class="fab fa-google"></i>

                Continue with Google

            </button>

            <p class="register">

                Don't have an account?

                <a href="register.html">

                    Register

                </a>

            </p>

        </form>

    </div>

</div>

<footer>

    © 2026 Pavalam Industries

</footer>

<script src="login.js"></script>

</body>

</html>
